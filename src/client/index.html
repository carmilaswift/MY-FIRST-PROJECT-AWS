<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban - Gestão de Tarefas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              surface: {
                900: '#0f1117',
                800: '#161822',
                700: '#1e2133',
                600: '#262a3d',
                500: '#2f3447',
              },
              accent: {
                blue: '#6C9FFF',
                purple: '#A78BFA',
                orange: '#FF9F43',
                pink: '#F472B6',
                green: '#34D399',
                red: '#F87171',
                cyan: '#67E8F9',
              },
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
              display: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            },
            boxShadow: {
              card: '0 2px 8px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2)',
              'card-hover':
                '0 8px 24px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.3)',
              'glow-blue': '0 0 20px rgba(108, 159, 255, 0.15)',
              'glow-purple': '0 0 20px rgba(167, 139, 250, 0.15)',
            },
            animation: {
              'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
              'slide-in': 'slideIn 0.25s cubic-bezier(0.16, 1, 0.3, 1)',
              'fade-in': 'fadeIn 0.2s ease-out',
              'scale-in': 'scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1)',
              'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
            },
            keyframes: {
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideIn: {
                '0%': { opacity: '0', transform: 'translateX(-8px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              pulseSoft: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.7' },
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/bold/style.css"
    />
    <style>
      * {
        scrollbar-width: thin;
        scrollbar-color: #2f3447 #161822;
      }
      *::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      *::-webkit-scrollbar-track {
        background: #161822;
      }
      *::-webkit-scrollbar-thumb {
        background: #2f3447;
        border-radius: 3px;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: #3d4259;
      }

      .kanban-col {
        min-height: calc(100vh - 200px);
      }

      .task-card {
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .task-card:hover {
        transform: translateY(-3px);
        box-shadow:
          0 8px 24px rgba(0, 0, 0, 0.4),
          0 2px 8px rgba(0, 0, 0, 0.3);
      }
      .task-card.dragging {
        opacity: 0.4;
        transform: rotate(2deg) scale(0.95);
      }

      .drop-zone {
        transition: all 0.2s ease;
      }
      .drop-zone.drag-over {
        background: rgba(108, 159, 255, 0.05) !important;
        border-color: rgba(108, 159, 255, 0.4) !important;
        box-shadow: inset 0 0 30px rgba(108, 159, 255, 0.03);
      }

      .modal-backdrop {
        backdrop-filter: blur(8px);
      }

      button:focus-visible,
      a:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: 2px solid #6c9fff;
        outline-offset: 2px;
      }

      .sidebar-item {
        transition: all 0.2s ease;
      }
      .sidebar-item:hover {
        background: rgba(108, 159, 255, 0.08);
      }
      .sidebar-item.active {
        background: rgba(108, 159, 255, 0.12);
        border-right: 2px solid #6c9fff;
      }

      .stat-card {
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .stat-card:hover {
        transform: translateY(-2px);
      }

      .btn-primary {
        background: linear-gradient(135deg, #6c9fff 0%, #a78bfa 100%);
        transition: all 0.2s ease;
      }
      .btn-primary:hover {
        box-shadow: 0 4px 16px rgba(108, 159, 255, 0.3);
        transform: translateY(-1px);
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body class="bg-surface-900 text-gray-200 min-h-screen font-sans antialiased">
    <div id="root"></div>
    <script src="/assets/app.js"></script>
  </body>
</html>
