<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban - Gestão de Tarefas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: {
              800: '#1e2130',
              900: '#14161f',
              950: '#0d0f17',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css" />
  <style>
    * { scrollbar-width: thin; scrollbar-color: #374151 #1f2937; }
    .kanban-col { min-height: calc(100vh - 200px); }
    .task-card { transition: all 0.2s ease; }
    .task-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
    .task-card.dragging { opacity: 0.5; transform: rotate(2deg); }
    .drop-zone.drag-over { border-color: #6366f1; background: rgba(99,102,241,0.05); }
    .modal-backdrop { backdrop-filter: blur(4px); }
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="bg-dark-950 text-gray-100 min-h-screen">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-type="module">

        {/* Comments Section */}
        <div className="border-t border-gray-700 pt-4">
          <h3 className="text-sm font-semibold mb-3 flex items-center gap-2"><i className="ph ph-chat-text text-indigo-400"></i> Comentários ({comments.length})</h3>
          <div className="flex gap-2 mb-4">
            <input value={newComment} onChange={e => setNewComment(e.target.value)} onKeyDown={e => e.key === 'Enter' && addComment()} placeholder="Adicionar comentário..." className="flex-1 px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg text-sm focus:outline-none focus:border-indigo-500 transition" />
            <button onClick={addComment} disabled={loading} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium transition disabled:opacity-50">Enviar</button>
          </div>
          <div className="space-y-3 max-h-48 overflow-y-auto">
            {comments.length === 0 && <p className="text-gray-500 text-sm text-center py-4">Nenhum comentário ainda.</p>}
            {comments.map(c => (
              <div key={c.id} className="bg-gray-900/50 rounded-lg p-3">
                <div className="flex items-center justify-between mb-1">
                  <span className="text-xs font-semibold text-indigo-300">{c.author}</span>
                  <span className="text-xs text-gray-500">{new Date(c.created_at).toLocaleDateString('pt-BR')}</span>
                </div>
                <p className="text-sm text-gray-300">{c.content}</p>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Task Card ──────────────────────────────────────────
function TaskCard({ task, onEdit, onDelete, onStatusChange, onClick }) {
  const formatDate = (d) => d ? new Date(d).toLocaleDateString('pt-BR') : null;
  const isOverdue = task.due_date && task.status !== 'done' && new Date(task.due_date) < new Date();

  const handleDragStart = (e) => {
    e.dataTransfer.setData('text/plain', task.id.toString());
    e.dataTransfer.effectAllowed = 'move';
    e.currentTarget.classList.add('dragging');
  };
  const handleDragEnd = (e) => {
    e.currentTarget.classList.remove('dragging');
  };

  const nextStatus = { todo: 'in-progress', 'in-progress': 'done', done: 'todo' };

  return (
    <div draggable="true" onDragStart={handleDragStart} onDragEnd={handleDragEnd}
      className="task-card bg-gray-800/80 border border-gray-700/50 rounded-xl p-4 cursor-grab active:cursor-grabbing"
      onClick={() => onClick(task)}>
      <div className="flex items-start justify-between mb-2">
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-[10px] px-2 py-0.5 rounded-full font-semibold uppercase tracking-wide" style={{backgroundColor: task.priority_color + '20', color: task.priority_color}}>{task.priority_name}</span>
          <span className="text-[10px] px-2 py-0.5 rounded-full font-semibold" style={{backgroundColor: task.category_color + '20', color: task.category_color}}>{task.category_name}</span>
        </div>
      </div>
      <h4 className="font-semibold text-sm mb-1 text-gray-100">{task.title}</h4>
      {task.description && <p className="text-xs text-gray-400 mb-3 line-clamp-2">{task.description}</p>}
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-1 text-xs text-gray-500">
          {task.due_date && (
            <span className={`flex items-center gap-1 ${isOverdue ? 'text-red-400' : ''}`}>
              <i className="ph ph-calendar-blank"></i>{formatDate(task.due_date)}
            </span>
          )}
        </div>
        <div className="flex items-center gap-1">
          <button onClick={e => { e.stopPropagation(); onStatusChange(task.id, nextStatus[task.status]); }} className="p-1.5 rounded-lg hover:bg-gray-700 text-gray-400 hover:text-emerald-400 transition" title="Alterar status">
            <i className="ph ph-arrow-right text-sm"></i>
          </button>
          <button onClick={e => { e.stopPropagation(); onEdit(task); }} className="p-1.5 rounded-lg hover:bg-gray-700 text-gray-400 hover:text-indigo-400 transition" title="Editar">
            <i className="ph ph-pencil-simple text-sm"></i>
          </button>
          <button onClick={e => { e.stopPropagation(); onDelete(task.id); }} className="p-1.5 rounded-lg hover:bg-gray-700 text-gray-400 hover:text-red-400 transition" title="Excluir">
            <i className="ph ph-trash text-sm"></i>
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Kanban Column ──────────────────────────────────────
function KanbanColumn({ column, tasks, onEdit, onDelete, onStatusChange, onCardClick }) {
  const handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); };
  const handleDragLeave = (e) => { e.currentTarget.classList.remove('drag-over'); };
  const handleDrop = (e) => {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    const taskId = e.dataTransfer.getData('text/plain');
    if (taskId) onStatusChange(Number(taskId), column.id);
  };

  return (
    <div className={`kanban-col drop-zone rounded-xl border-2 border-dashed ${column.border} ${column.bg} p-4 transition-all`}
      onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}>
      <div className="flex items-center justify-between mb-4">
        <div className="flex items-center gap-2">
          <i className={`ph ${column.icon} text-lg ${column.color}`}></i>
          <h3 className="font-semibold text-sm">{column.title}</h3>
        </div>
        <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${column.bg} ${column.color}`}>{tasks.length}</span>
      </div>
      <div className="space-y-3">
        {tasks.length === 0 && (
          <div className="text-center py-8 text-gray-500 text-sm">
            <i className="ph ph-dotted-square text-2xl block mb-2 opacity-50"></i>
            Arraste tarefas aqui
          </div>
        )}
        {tasks.map(task => (
          <TaskCard key={task.id} task={task} onEdit={onEdit} onDelete={onDelete} onStatusChange={onStatusChange} onClick={onCardClick} />
        ))}
      </div>
    </div>
  );
}

// ─── Main App ───────────────────────────────────────────
function App() {
  const [tasks, setTasks] = useState([]);
  const [categories, setCategories] = useState([]);
  const [priorities, setPriorities] = useState([]);
  const [modalOpen, setModalOpen] = useState(false);
  const [editingTask, setEditingTask] = useState(null);
  const [detailTask, setDetailTask] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);

  const loadTasks = () => fetchJSON(`${API}/tasks`).then(setTasks);
  const loadMeta = () => {
    fetchJSON(`${API}/categories`).then(setCategories);
    fetchJSON(`${API}/priorities`).then(setPriorities);
  };

  useEffect(() => { loadTasks(); loadMeta(); }, []);

  const handleSave = async (form) => {
    if (editingTask) {
      await fetchJSON(`${API}/tasks/${editingTask.id}`, { method: 'PUT', body: JSON.stringify(form) });
    } else {
      await fetchJSON(`${API}/tasks`, { method: 'POST', body: JSON.stringify(form) });
    }
    setModalOpen(false);
    setEditingTask(null);
    loadTasks();
  };

  const handleStatusChange = async (id, status) => {
    await fetchJSON(`${API}/tasks/${id}/status`, { method: 'PATCH', body: JSON.stringify({ status }) });
    loadTasks();
  };

  const handleDeleteConfirm = async () => {
    if (confirmDelete) {
      await fetchJSON(`${API}/tasks/${confirmDelete}`, { method: 'DELETE' });
      setConfirmDelete(null);
      setDetailTask(null);
      loadTasks();
    }
  };

  const openEdit = (task) => { setEditingTask(task); setModalOpen(true); };
  const openNew = () => { setEditingTask(null); setModalOpen(true); };

  const todoTasks = tasks.filter(t => t.status === 'todo');
  const inProgressTasks = tasks.filter(t => t.status === 'in-progress');
  const doneTasks = tasks.filter(t => t.status === 'done');

  const tasksByCol = { todo: todoTasks, 'in-progress': inProgressTasks, done: doneTasks };

  return (
    <div className="min-h-screen p-6">
      {/* Header */}
      <header className="max-w-7xl mx-auto mb-8">
        <div className="flex items-center justify-between">
          <div>
            <h1 className="text-2xl font-bold flex items-center gap-3">
              <div className="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center">
                <i className="ph ph-kanban text-lg text-white"></i>
              </div>
              Kanban Board
            </h1>
            <p className="text-gray-500 text-sm mt-1">Gerencie suas tarefas com drag &amp; drop</p>
          </div>
          <button onClick={openNew} className="flex items-center gap-2 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-sm font-medium transition shadow-lg shadow-indigo-600/20">
            <i className="ph ph-plus-circle text-lg"></i> Nova Tarefa
          </button>
        </div>

        {/* Status counters */}
        <div className="grid grid-cols-3 gap-4 mt-6">
          <div className="bg-gray-800/50 border border-gray-700/50 rounded-xl p-4 flex items-center gap-3">
            <div className="w-10 h-10 bg-blue-500/20 rounded-lg flex items-center justify-center"><i className="ph ph-circle-dashed text-blue-400 text-xl"></i></div>
            <div><p className="text-2xl font-bold">{todoTasks.length}</p><p className="text-xs text-gray-500">A Fazer</p></div>
          </div>
          <div className="bg-gray-800/50 border border-gray-700/50 rounded-xl p-4 flex items-center gap-3">
            <div className="w-10 h-10 bg-amber-500/20 rounded-lg flex items-center justify-center"><i className="ph ph-spinner text-amber-400 text-xl"></i></div>
            <div><p className="text-2xl font-bold">{inProgressTasks.length}</p><p className="text-xs text-gray-500">Em Progresso</p></div>
          </div>
          <div className="bg-gray-800/50 border border-gray-700/50 rounded-xl p-4 flex items-center gap-3">
            <div className="w-10 h-10 bg-emerald-500/20 rounded-lg flex items-center justify-center"><i className="ph ph-check-circle text-emerald-400 text-xl"></i></div>
            <div><p className="text-2xl font-bold">{doneTasks.length}</p><p className="text-xs text-gray-500">Concluídas</p></div>
          </div>
        </div>
      </header>

      {/* Kanban Board */}
      <main className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        {COLUMNS.map(col => (
          <KanbanColumn key={col.id} column={col} tasks={tasksByCol[col.id]} onEdit={openEdit} onDelete={(id) => setConfirmDelete(id)} onStatusChange={handleStatusChange} onCardClick={(t) => setDetailTask(t)} />
        ))}
      </main>

      {/* Modals */}
      <TaskModal open={modalOpen} task={editingTask} categories={categories} priorities={priorities} onSave={handleSave} onClose={() => { setModalOpen(false); setEditingTask(null); }} />
      <TaskDetailModal open={!!detailTask} task={detailTask} onClose={() => setDetailTask(null)} onDelete={(id) => { setDetailTask(null); setConfirmDelete(id); }} onStatusChange={(id, s) => { handleStatusChange(id, s); setDetailTask(null); }} onRefresh={loadTasks} />
      <ConfirmDialog open={!!confirmDelete} title="Excluir Tarefa" message="Tem certeza que deseja excluir esta tarefa? Esta ação não pode ser desfeita." onConfirm={handleDeleteConfirm} onCancel={() => setConfirmDelete(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
